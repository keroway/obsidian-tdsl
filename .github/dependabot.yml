version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    labels:
      - dependencies
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    # major updates are not grouped → individual PRs per package

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
    labels:
      - dependencies
    groups:
      github-actions:
        update-types:
          - minor
          - patch
